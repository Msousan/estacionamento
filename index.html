<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrada Expressa - Digitação</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { color: #333; margin-bottom: 20px; text-align: center; }
        
        .input-group {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        label {
            font-size: 18px;
            font-weight: bold;
            color: #555;
        }

        /* Campo de digitação gigante para facilitar o toque */
        #placa-input {
            font-size: 40px;
            text-align: center;
            padding: 15px;
            border: 2px solid #007bff;
            border-radius: 8px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            outline: none;
        }
        
        #placa-input:focus {
            border-color: #0056b3;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.5);
        }

        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background-color 0.2s;
        }
        .btn:active { background-color: #0056b3; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        
        #status { margin-top: 20px; font-weight: bold; color: #555; text-align: center; font-size: 16px; }
    </style>
</head>
<body>

    <h2>Controle de Vagas</h2>

    <div class="input-group">
        <label for="placa-input">Digite a Placa do Veículo:</label>
        <!-- Limita a 7 caracteres e usa o teclado padrão -->
        <input type="text" id="placa-input" maxlength="7" placeholder="ABC1234" autocomplete="off">
    </div>

    <button id="btn-print" class="btn" disabled>🖨️ Registrar e Imprimir</button>
    <div id="status">Aguardando digitação...</div>

    <script>
        const placaInput = document.getElementById('placa-input');
        const btnPrint = document.getElementById('btn-print');
        const statusDiv = document.getElementById('status');

        // Lógica para validar a entrada em tempo real
        placaInput.addEventListener('input', function(e) {
            // Remove qualquer caractere que não seja letra ou número e força maiúscula
            this.value = this.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
            
            // Só libera o botão de imprimir se tiver exatamente 7 caracteres
            if (this.value.length === 7) {
                btnPrint.disabled = false;
                btnPrint.style.backgroundColor = '#28a745'; // Fica verde indicando que está pronto
                statusDiv.innerText = "Placa válida. Pronto para imprimir!";
            } else {
                btnPrint.disabled = true;
                btnPrint.style.backgroundColor = '#007bff';
                statusDiv.innerText = "Digite os 7 caracteres da placa.";
            }
        });

        // Comunicação Bluetooth com a Mini Impressora
        btnPrint.addEventListener('click', async () => {
            const placaAtual = placaInput.value;
            const horaAtual = new Date().toLocaleString('pt-BR');
            
            try {
                btnPrint.disabled = true;
                statusDiv.innerText = "Conectando à impressora bluetooth...";
                
                // Solicita pareamento com dispositivos Bluetooth genéricos
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
                const characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

                // Monta o layout do ticket
                const textoTicket = 
                    "ESTACIONAMENTO\n" +
                    "------------------------\n" +
                    "Placa: " + placaAtual + "\n" +
                    "Entrada: " + horaAtual + "\n" +
                    "------------------------\n" +
                    "\n\n\n";

                const encoder = new TextEncoder();
                const data = encoder.encode(textoTicket);

                // Dispara a impressão
                await characteristic.writeValue(data);
                
                statusDiv.innerText = "Ticket impresso com sucesso!";
                
                // Desconecta a impressora e limpa o campo para o próximo carro
                device.gatt.disconnect();
                placaInput.value = "";
                btnPrint.disabled = true;
                btnPrint.style.backgroundColor = '#007bff';
                
                setTimeout(() => {
                    statusDiv.innerText = "Aguardando próxima placa...";
                    placaInput.focus(); // Já deixa o teclado aberto
                }, 2000);

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Erro ao conectar. Ligue a impressora e tente novamente.";
                btnPrint.disabled = false;
            }
        });
    </script>
</body>
</html>
